experiment_name: "cnn1d_large_filters"

model:
  type: "cnn1d"
  num_classes: 24
  input_channels: 2
  filters: 128
  kernel_size: 5
  dropout: 0.5
  dense_units: 512

training:
  batch_size: 512
  epochs: 50
  learning_rate: 0.0005
  optimizer: "adamw"
  weight_decay: 0.0001
  early_stopping_patience: 10
  num_workers: 0
  pin_memory: true

data:
  hdf5_path: "data/raw/radioml2018/GOLD_XYZ_OSC.0001_1024.hdf5"
  split_path: "data/splits/radioml2018a_seed42_60_20_20.npz"
  random_seed: 42
  sample_normalize: false

output:
  experiments_dir: "experiments"
